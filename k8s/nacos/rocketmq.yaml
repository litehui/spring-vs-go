apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-namesrv
  namespace: middleware
  labels:
    app: rocketmq-namesrv
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-namesrv
  template:
    metadata:
      labels:
        app: rocketmq-namesrv
    spec:
      containers:
      - name: namesrv
        image: apache/rocketmq:5.3.1
        command: ["sh", "mqnamesrv"]
        ports:
        - containerPort: 9876
          name: namesrv
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq
  namespace: middleware
  labels:
    app: rocketmq-namesrv
spec:
  type: ClusterIP
  ports:
  - port: 9876
    targetPort: 9876
    name: namesrv
  selector:
    app: rocketmq-namesrv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-broker
  namespace: middleware
  labels:
    app: rocketmq-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-broker
  template:
    metadata:
      labels:
        app: rocketmq-broker
    spec:
      containers:
      - name: broker
        image: apache/rocketmq:5.3.1
        command: ["sh", "mqbroker", "-n", "rocketmq.middleware.svc.cluster.local:9876"]
        ports:
        - containerPort: 10911
          name: broker
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-broker
  namespace: middleware
  labels:
    app: rocketmq-broker
spec:
  type: ClusterIP
  ports:
  - port: 10911
    targetPort: 10911
    name: broker
  selector:
    app: rocketmq-broker
