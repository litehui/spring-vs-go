apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-dashboard
  namespace: middleware
  labels:
    app: sentinel-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinel-dashboard
  template:
    metadata:
      labels:
        app: sentinel-dashboard
    spec:
      containers:
      - name: sentinel-dashboard
        image: bladex/sentinel-dashboard:1.8.9
        ports:
        - containerPort: 8858
          name: http
        env:
        - name: JAVA_OPTS
          value: "-Dserver.port=8858 -Dcsp.sentinel.dashboard.server=localhost:8858"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-dashboard
  namespace: middleware
  labels:
    app: sentinel-dashboard
spec:
  type: ClusterIP
  ports:
  - port: 8858
    targetPort: 8858
    name: http
  selector:
    app: sentinel-dashboard
