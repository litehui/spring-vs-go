apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-primary-config
  namespace: database
data:
  postgresql.conf: |
    listen_addresses = '*'
    wal_level = replica
    max_wal_senders = 10
    wal_keep_size = 256MB
    hot_standby = on
  pg_hba.conf: |
    host    replication     replicator      0.0.0.0/0               md5
    host    all             all             0.0.0.0/0               md5
    local   all             all                                     trust
