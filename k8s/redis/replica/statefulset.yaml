apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-replica
  namespace: cache
  labels:
    app: redis
    role: replica
spec:
  serviceName: redis-replica
  replicas: 1
  selector:
    matchLabels:
      app: redis
      role: replica
  template:
    metadata:
      labels:
        app: redis
        role: replica
    spec:
      containers:
      - name: redis
        image: redis:8
        ports:
        - containerPort: 6379
          name: redis
        command:
        - redis-server
        - --requirepass
        - redis123
        - --appendonly
        - "yes"
        - --replicaof
        - redis-master.cache.svc.cluster.local
        - "6379"
        - --masterauth
        - redis123
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          exec:
            command:
            - redis-cli
            - -a
            - redis123
            - ping
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: redis-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
