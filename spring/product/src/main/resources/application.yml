server:
  port: 8084

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://postgresql.database.svc.cluster.local:5432/product_db
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: redis-master.cache.svc.cluster.local
      port: 6379
      password: redis123
  cloud:
    nacos:
      discovery:
        server-addr: nacos.middleware.svc.cluster.local:8848
      config:
        import: nacos:product-service.yml?refresh=true
        server-addr: nacos.middleware.svc.cluster.local:8848
    stream:
      bindings:
        productProducer-out-0:
          destination: product-topic
          content-type: application/json
        productConsumer-in-0:
          destination: product-topic
          content-type: application/json
          group: product-group
      rocketmq:
        binder:
          name-server: rocketmq:9876

sa-token:
  token-name: satoken
  timeout: 86400
  is-read-cookie: false
  is-read-header: true
  token-style: uuid

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    com.compare: debug
